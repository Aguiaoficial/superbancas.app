        // Funções para Geração de Palpites Dinâmicos (Múltiplos itens)
        function sortearBichoEDezena() {
            const bicho = bichosInfo[Math.floor(Math.random() * bichosInfo.length)];
            const dezena = bicho.dezenas[Math.floor(Math.random() * bicho.dezenas.length)];
            return { bicho, dezena };
        }

        function gerarDadosPalpite() {
            let milhares = [];
            let centenas = [];
            let dezenas = [];

            // Gerar 5 milhares completas
            for (let i = 0; i < 5; i++) {
                const { dezena } = sortearBichoEDezena();
                const prefixo = Math.floor(10 + Math.random() * 90).toString(); // 2 dígitos aleatórios
                milhares.push(prefixo + dezena);
            }

            // Gerar 5 centenas completas
            for (let i = 0; i < 5; i++) {
                const { dezena } = sortearBichoEDezena();
                const prefixo = Math.floor(Math.random() * 10).toString(); // 1 dígito aleatório
                centenas.push(prefixo + dezena);
            }

            // Gerar 2 dezenas completas
            for (let i = 0; i < 2; i++) {
                const { dezena } = sortearBichoEDezena();
                dezenas.push(dezena);
            }

            // Define o Grupo Principal do Dia baseado no primeiro palpite
            const bichoBase = bichosInfo[Math.floor(Math.random() * bichosInfo.length)];

            return {
                milhar: milhares.join(' - '),
                centena: centenas.join(' - '),
                dezena: dezenas.join(' - '),
                grupo: `${bichoBase.grupo} - ${bichoBase.nome}`,
                puxada: `${bichoBase.nome} puxa -> ${bichoBase.puxa}`
            };
        }

        function obterDataAtualFormatada() {
            const data = new Date();
            return `${data.getFullYear()}-${data.getMonth() + 1}-${data.getDate()}`;

        const btnGerar = document.getElementById('gerarPalpites');
        const bancaError = document.getElementById('bancaError');
        const blocoResultado = document.getElementById('resultadoPalpiteBlock');

        bancaSelect.addEventListener('change', function() {
            if (this.value !== "") {
                btnGerar.removeAttribute('disabled');
                bancaError.classList.add('hidden');
                carregarOuExibirPalpite(this.value);
            } else {
                btnGerar.setAttribute('disabled', 'true');
                blocoResultado.classList.add('hidden');
            }
        });

        function carregarOuExibirPalpite(banca) {
            const hoje = obterDataAtualFormatada();
            const chaveStorage = `palpite_${banca.replace(/\s+/g, '_').toLowerCase()}`;
            const palpiteArmazenado = localStorage.getItem(chaveStorage);

            if (palpiteArmazenado) {
                const dados = JSON.parse(palpiteArmazenado);
                if (dados.data === hoje) {
                    mostrarPalpiteNaTela(banca, dados);
                    return;
                } else {
                    localStorage.removeItem(chaveStorage);
                }
            }
            blocoResultado.classList.add('hidden');
        }

        function mostrarPalpiteNaTela(banca, dados) {
            document.getElementById('tituloResultadoBanca').innerText = `Palpites para ${banca}`;
            document.getElementById('resMilhar').innerText = dados.milhar;
            document.getElementById('resCentena').innerText = dados.centena;
            document.getElementById('resDezena').innerText = dados.dezena;
            document.getElementById('resGrupo').innerText = dados.grupo;
            document.getElementById('resPuxadaTexto').innerText = dados.puxada;
            blocoResultado.classList.remove('hidden');
        }

        btnGerar.addEventListener('click', function() {
            const banca = bancaSelect.value;
            if (!banca) {
                bancaError.classList.remove('hidden');
                return;
            }

            const hoje = obterDataAtualFormatada();
            const chaveStorage = `palpite_${banca.replace(/\s+/g, '_').toLowerCase()}`;
            
            const novosDados = gerarDadosPalpite();
            novosDados.data = hoje; 

            localStorage.setItem(chaveStorage, JSON.stringify(novosDados));
            mostrarPalpiteNaTela(banca, novosDados);
        });
    </script>
</body>
</html>
